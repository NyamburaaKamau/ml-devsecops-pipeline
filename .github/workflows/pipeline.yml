name: ML DevSecOps Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even if tests fail (emergency only)"
        required: false
        default: "false"

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/ml-serving
  PYTHON_VERSION: "3.11"
  KUBECTL_VERSION: "v1.29.0"

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:

  ml-train-and-validate:
    runs-on: ubuntu-latest
    outputs:
      model-approved: ${{ steps.validate.outputs.approved }}
      model-roc-auc: ${{ steps.validate.outputs.roc_auc }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -r requirements.txt

      - run: python ml/model/train.py

      - id: validate
        run: |
          python ml/validation/validate.py
          ROC_AUC=$(python -c "import json; m=json.load(open('ml/model/metrics.json')); print(m['roc_auc'])")
          echo "roc_auc=$ROC_AUC" >> $GITHUB_OUTPUT
          echo "approved=true" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            ml/model/model.joblib
            ml/model/metrics.json


  security-scan-code:
    runs-on: ubuntu-latest
    needs: ml-train-and-validate

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit


  security-scan-iac:
    runs-on: ubuntu-latest
    needs: ml-train-and-validate

    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: platform/
          exit-code: "0"


  build-image:
    runs-on: ubuntu-latest
    needs: [security-scan-code, security-scan-iac]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: ml/model/

      - uses: docker/setup-buildx-action@v3

      # ✅ FIXED LOGIN
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true


  security-scan-image:
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      # ✅ FIXED LOGIN (must use Docker creds again)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-image.outputs.image-tag }}
          severity: CRITICAL,HIGH
          exit-code: "1"


  sign-image:
    runs-on: ubuntu-latest
    needs: security-scan-image
    permissions:
      id-token: write

    steps:
      - uses: sigstore/cosign-installer@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: |
          cosign sign --yes \
          ${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image-digest }}


  deploy:
    runs-on: ubuntu-latest
    needs: sign-image
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v3
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - run: |
          cosign verify \
          --certificate-identity-regexp="https://github.com/${{ github.repository }}/*" \
          --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
          ${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image-digest }}

      - run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ env.IMAGE_NAME }}@${{ needs.build-image.outputs.image-digest }}|g" \
          platform/kubernetes/deployment.yaml

      - run: |
          kubectl apply -f platform/kubernetes/
          kubectl rollout status deployment/ml-serving -n ml-serving --timeout=300s "🚨 Deployment failed. Initiating rollback..."
          kubectl rollout undo deployment/ml-serving -n ml-serving
          echo "✅ Rolled back to previous version."
