name: ML DevSecOps Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ml-serving
  PYTHON_VERSION: "3.11"

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:

  # ============================================================
  # STAGE 1: Train & Validate Model
  # ============================================================
  ml-train-and-validate:
    name: Train and Validate Model
    runs-on: ubuntu-latest
    outputs:
      model-approved: ${{ steps.validate.outputs.approved }}
      roc-auc: ${{ steps.validate.outputs.roc_auc }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python ml/model/train.py

      - name: Run validation gate
        id: validate
        run: |
          python ml/validation/validate.py
          ROC_AUC=$(python -c "import json; m=json.load(open('ml/model/metrics.json')); print(m['roc_auc'])")
          echo "roc_auc=$ROC_AUC" >> $GITHUB_OUTPUT
          echo "approved=true" >> $GITHUB_OUTPUT

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            ml/model/model.joblib
            ml/model/metrics.json
          retention-days: 30

  # ============================================================
  # STAGE 2: Code Security Scanning
  # ============================================================
  security-scan-code:
    name: Code Security Scanning
    runs-on: ubuntu-latest
    needs: ml-train-and-validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scanning with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST with Semgrep
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >-
            p/python
            p/security-audit
            p/secrets
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Python dependency audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true

  # ============================================================
  # STAGE 3: IaC Security Scanning
  # ============================================================
  security-scan-iac:
    name: IaC Security Scanning
    runs-on: ubuntu-latest
    needs: ml-train-and-validate
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: config
          scan-ref: platform/
          exit-code: "0"
          severity: CRITICAL,HIGH

      - name: Checkov K8s scan
        uses: bridgecrewio/checkov-action@master
        continue-on-error: true
        with:
          directory: platform/kubernetes
          framework: kubernetes
          soft_fail: true

  # ============================================================
  # STAGE 4: Build and Push Image
  # ============================================================
  build-image:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: [security-scan-code, security-scan-iac]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: ml/model/

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
